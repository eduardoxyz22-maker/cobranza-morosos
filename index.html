<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobranza — Multiespumas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light;--red:#ef4444;--red-light:#fef2f2;--red-border:#fecaca;--orange:#f97316;--orange-light:#fff7ed;--orange-border:#fed7aa;--yellow:#eab308;--yellow-light:#fefce8;--yellow-border:#fef08a;--green:#22c55e;--green-light:#f0fdf4;--green-border:#bbf7d0;--blue:#3b82f6;--blue-light:#eff6ff;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--gray-100);color:var(--gray-800);min-height:100vh;}
.topbar{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{width:32px;height:32px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.topbar-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px;}
.topbar-sub{color:#94a3b8;font-size:12px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-date{color:#94a3b8;font-size:12px;}
.topbar-badge{background:#ef4444;color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.main{padding:24px 28px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.kpi-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid transparent;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06;}
.kpi-card.red{border-left-color:var(--red);}.kpi-card.red::after{background:var(--red);}
.kpi-card.orange{border-left-color:var(--orange);}.kpi-card.orange::after{background:var(--orange);}
.kpi-card.blue{border-left-color:var(--blue);}.kpi-card.blue::after{background:var(--blue);}
.kpi-card.yellow{border-left-color:var(--yellow);}.kpi-card.yellow::after{background:var(--yellow);}
.kpi-icon{font-size:22px;margin-bottom:10px;}
.kpi-value{font-size:26px;font-weight:800;color:var(--gray-900);letter-spacing:-.5px;line-height:1;}
.kpi-label{font-size:12px;color:var(--gray-500);margin-top:4px;font-weight:500;}
.kpi-sub{font-size:11px;color:var(--gray-400);margin-top:6px;}
.two-col{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-bottom:24px;}
.panel{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:14px;font-weight:700;color:var(--gray-800);}
.panel-body{padding:20px;}
.sort-bar{display:flex;gap:8px;align-items:center;}
.sort-btn{background:var(--gray-100);border:1px solid var(--gray-200);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--gray-600);cursor:pointer;font-weight:500;transition:all .15s;}
.sort-btn:hover,.sort-btn.active{background:#1e293b;color:#fff;border-color:#1e293b;}
.search-wrap{padding:0 20px 14px;border-bottom:1px solid var(--gray-100);}
.search-box{display:flex;align-items:center;gap:10px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:10px;padding:9px 14px;transition:border-color .2s;}
.search-box:focus-within{border-color:#3b82f6;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.search-icon{font-size:14px;color:var(--gray-400);flex-shrink:0;}
.search-input{border:none;background:transparent;outline:none;font-size:13px;color:var(--gray-800);width:100%;font-family:inherit;}
.search-input::placeholder{color:var(--gray-400);}
.search-clear{background:var(--gray-200);border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:10px;color:var(--gray-500);display:none;align-items:center;justify-content:center;flex-shrink:0;}
.search-clear.visible{display:flex;}.search-clear:hover{background:var(--gray-300);}
.no-results{padding:32px;text-align:center;color:var(--gray-400);}
.no-results .no-icon{font-size:32px;margin-bottom:8px;}
.no-results .no-text{font-size:13px;font-weight:500;}
.no-results .no-sub{font-size:12px;margin-top:4px;}
.highlight{background:#fef08a;border-radius:2px;padding:0 1px;}
.client-table{width:100%;}
.ct-header{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 80px;gap:8px;padding:8px 16px;font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gray-100);}
.ct-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 80px;gap:8px;padding:14px 16px;border-bottom:1px solid var(--gray-50);align-items:center;cursor:pointer;transition:background .15s;}
.ct-row:hover{background:var(--gray-50);}.ct-row:last-child{border-bottom:none;}
.client-info{display:flex;align-items:center;gap:10px;}
.avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}
.av-red{background:linear-gradient(135deg,#ef4444,#dc2626);}.av-orange{background:linear-gradient(135deg,#f97316,#ea580c);}.av-yellow{background:linear-gradient(135deg,#eab308,#ca8a04);}.av-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.client-name{font-weight:700;font-size:13px;color:var(--gray-800);}.client-orders{font-size:11px;color:var(--gray-400);margin-top:1px;}
.amount-wrap .amount-value{font-size:14px;font-weight:800;color:var(--gray-900);}.amount-wrap .amount-bar-bg{height:4px;background:var(--gray-100);border-radius:2px;margin-top:6px;}.amount-wrap .amount-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,#3b82f6,#1d4ed8);}
.days-badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;white-space:nowrap;}
.days-critical{background:var(--red-light);color:var(--red);border:1px solid var(--red-border);}.days-warning{background:var(--orange-light);color:var(--orange);border:1px solid var(--orange-border);}.days-alert{background:var(--yellow-light);color:#92400e;border:1px solid var(--yellow-border);}.days-nd{background:var(--gray-100);color:var(--gray-500);border:1px solid var(--gray-200);}
.urgency-wrap{display:flex;flex-direction:column;gap:3px;}.urgency-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}.urgency-dots{display:flex;gap:3px;}.dot{width:8px;height:8px;border-radius:50%;background:var(--gray-200);}.dot.active-red{background:var(--red);}.dot.active-orange{background:var(--orange);}.dot.active-yellow{background:var(--yellow);}
.expand-btn{width:28px;height:28px;border-radius:8px;background:var(--gray-100);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gray-500);transition:all .15s;margin-left:auto;}.expand-btn:hover{background:var(--gray-200);}.expand-btn.open{background:#1e293b;color:#fff;transform:rotate(180deg);}
.detail-row{display:none;background:#f8fafc;border-bottom:1px solid var(--gray-100);}.detail-row.open{display:block;}
.detail-inner{padding:12px 16px 16px 62px;}.detail-title{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.detail-table{width:100%;border-collapse:collapse;font-size:12px;}.detail-table th{text-align:left;padding:6px 8px;color:var(--gray-400);font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--gray-100);font-weight:600;}.detail-table td{padding:8px 8px;border-bottom:1px solid var(--gray-50);color:var(--gray-700);}.detail-table tr:last-child td{border-bottom:none;}
.tag{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;}.tag-no{background:var(--red-light);color:var(--red);}.tag-si{background:var(--green-light);color:#166534;}.tag-ent{background:var(--blue-light);color:#1d4ed8;}.num{text-align:right;font-weight:600;}
.chart-wrap{height:190px;position:relative;}
.aging-list{margin-top:16px;}.aging-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-50);}.aging-item:last-child{border-bottom:none;}.aging-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}.aging-name{font-size:12px;color:var(--gray-600);margin-left:8px;flex:1;}.aging-count{font-size:11px;color:var(--gray-400);margin-right:8px;}.aging-amount{font-size:12px;font-weight:700;color:var(--gray-800);}
footer{text-align:center;padding:16px;font-size:11px;color:var(--gray-400);}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}.ct-header,.ct-row{grid-template-columns:2fr 1fr 1fr 60px;}.ct-header > *:nth-child(4),.ct-row > *:nth-child(4){display:none;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">💰</div>
    <div>
      <div class="topbar-title">Multiespumas — Cobranza</div>
      <div class="topbar-sub">Control de clientes morosos · Actualizado 17/06/2026</div>
    </div>
  </div>
  <div clas="topbar-right">
    <span class="topbar-date" id="topbar-date"></span>
    <span class="topbar-badge" id="alert-count">7 deudores</span>
  </div>
</div>
</body>
</html>
